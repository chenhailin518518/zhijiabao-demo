<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全网比价 - 智价宝</title>
  <link rel="stylesheet" href="styles.css?v=20260617b">
</head>
<body data-page="compare" class="skeleton-active">
  <canvas id="particleCanvas" aria-hidden="true"></canvas>
  <div class="transition-mask" aria-hidden="true"></div>
  <div class="skeleton-screen" id="skeletonScreen" aria-hidden="true">
    <div class="skeleton-stage">
      <div class="skeleton-nav">
        <div class="skeleton-brand">
          <div class="skeleton-logo"></div>
          <div class="skeleton-lines" style="gap:8px;">
            <div class="skel text short" style="width:110px;height:18px;"></div>
            <div class="skel text short" style="width:150px;height:12px;"></div>
          </div>
        </div>
        <div class="skeleton-menu">
          <div class="skel button" style="width:58px;height:34px;"></div>
          <div class="skel button" style="width:92px;height:34px;"></div>
          <div class="skel button" style="width:78px;height:34px;"></div>
          <div class="skel button" style="width:78px;height:34px;"></div>
          <div class="skel button" style="width:78px;height:34px;"></div>
        </div>
      </div>
      <div class="skeleton-hero">
        <div class="skeleton-lines">
          <div class="skel kicker"></div>
          <div class="skel title"></div>
          <div class="skel title short"></div>
          <div class="skel text"></div>
          <div class="skel text medium"></div>
          <div class="skeleton-actions">
            <div class="skel button"></div>
            <div class="skel button"></div>
          </div>
        </div>
        <div class="skeleton-phone"></div>
      </div>
      <div class="skeleton-card-row">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
  </div>

  <header class="site-header">
    <a class="brand" href="index.html" data-transition>
      <span class="brand-mark">智</span>
      <span>
        <span class="brand-title">智价宝</span>
        <span class="brand-sub">全网文创价格雷达</span>
      </span>
    </a>
    <nav class="main-nav" aria-label="主导航">
      <a class="nav-link " href="index.html" data-transition><span>首页</span></a>
      <a class="nav-link " href="estimate.html" data-transition><span>AI智能估价</span></a>
      <a class="nav-link active" href="compare.html" data-transition><span>全网比价</span></a>
      <a class="nav-link " href="market.html" data-transition><span>二手集市</span></a>
      <a class="nav-link " href="profile.html" data-transition><span>个人中心</span></a>
    </nav>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深色国风主题" aria-pressed="false" title="切换主题">
      <span class="theme-toggle-icon" aria-hidden="true">☾</span>
    </button>
  </header>

  <div class="page-shell">
    <main class="page-main">
      <section class="wide-content page-hero reveal">
        <p class="section-kicker">Price Radar</p>
        <h1 class="shine-text">全网比价，找到文创合理价</h1>
        <p class="muted">聚合官方商城、商户尾货、二手低价与平台建议成交区间，用模拟数据展示文旅产品价格透明化。</p>
      </section>

      <section class="wide-content">
        <div class="toolbar reveal">
          <div class="search-box">
            <input class="field" id="compareSearch" placeholder="搜索文创、景区或关键词">
            <span class="search-icon">⌕</span>
          </div>
          <aside class="range-panel glass-card">
            <strong>价格筛选</strong>
            <p class="muted" id="rangeText">¥220 以下</p>
            <input id="priceRange" type="range" min="30" max="220" value="220">
          </aside>
        </div>
        <div class="tag-filter reveal" aria-label="景区分类">
          <button class="filter-tag active" data-category="全部">全部</button>
          <button class="filter-tag" data-category="北京">北京</button>
          <button class="filter-tag" data-category="杭州">杭州</button>
          <button class="filter-tag" data-category="敦煌">敦煌</button>
          <button class="filter-tag" data-category="黄山">黄山</button>
          <button class="filter-tag" data-category="西安">西安</button>
        </div>
        <div class="market-grid smooth-list reveal" id="compareList" style="margin-top: 24px;"></div>
      </section>
    </main>
  </div>


  <script src="script.js?v=20260617b"></script>
